<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Brain — Leaderboard 📊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── PASTE YOUR SHEET CSV URL HERE ── */
    /* See instructions at the bottom of this file */

    :root {
      --grass: #1b4332;
      --grass-mid: #2d6a4f;
      --grass-light: #40916c;
      --accent: #ffd60a;
      --accent2: #ff6b35;
      --red: #e63946;
      --blue: #4a90d9;
      --white: #f8f9fa;
      --card: rgba(255,255,255,0.06);
      --card-border: rgba(255,255,255,0.1);
      --text: #f1f1f1;
      --text-dim: rgba(255,255,255,0.5);
      --font-head: 'Fredoka One', cursive;
      --font-body: 'Nunito', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--grass);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* pitch stripes */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 80px,
        rgba(0,0,0,0.07) 80px, rgba(0,0,0,0.07) 160px
      );
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ── HEADER ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
      margin-bottom: 36px;
    }

    .header-left {
      display: flex; align-items: center; gap: 16px;
    }

    .ball-icon {
      font-size: 52px;
      animation: bounce 2s ease-in-out infinite;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .header-titles h1 {
      font-family: var(--font-head);
      font-size: 38px;
      line-height: 1;
      color: white;
    }
    .header-titles h1 span { color: var(--accent); }
    .header-titles p {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    .btn-refresh {
      background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: white;
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 14px;
      padding: 10px 22px;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-refresh:hover { background: rgba(255,255,255,0.2); }
    .btn-refresh.spinning .refresh-icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SUMMARY CARDS ── */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 18px 16px;
      text-align: center;
      backdrop-filter: blur(8px);
      animation: fadeUp 0.4s ease both;
    }

    .summary-card .sc-icon { font-size: 26px; margin-bottom: 6px; }
    .summary-card .sc-val {
      font-family: var(--font-head);
      font-size: 28px;
      color: white;
    }
    .summary-card .sc-lbl {
      font-size: 11px; font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ── CONTROLS BAR ── */
    .controls-bar {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      margin-bottom: 20px;
    }

    .search-wrap {
      position: relative; flex: 1; min-width: 200px;
    }
    .search-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      color: white;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14px;
      padding: 10px 16px 10px 40px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-dim); }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; pointer-events: none;
    }

    .filter-select {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: white;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 50px;
      outline: none;
      cursor: pointer;
    }
    .filter-select option { background: #1b4332; }

    .sort-btn {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: white;
      font-family: var(--font-body);
      font-weight: 800;
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .sort-btn.active {
      background: var(--accent);
      color: #1b1b1b;
      border-color: var(--accent);
    }
    .sort-btn:hover:not(.active) { background: rgba(255,255,255,0.15); }

    /* ── TABS ── */
    .tab-row {
      display: flex; gap: 6px;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 0;
    }

    .tab-btn {
      background: none; border: none;
      color: var(--text-dim);
      font-family: var(--font-body);
      font-weight: 800; font-size: 14px;
      padding: 10px 18px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:hover:not(.active) { color: white; }

    /* ── LEADERBOARD TABLE ── */
    #view-leaderboard, #view-players, #view-sessions { display: none; }
    #view-leaderboard.visible, #view-players.visible, #view-sessions.visible { display: block; }

    .podium-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .podium-card {
      border-radius: 18px;
      padding: 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .podium-card.gold {
      background: linear-gradient(135deg, #7b5c00, #f5c518);
      border: 2px solid #ffd60a;
    }
    .podium-card.silver {
      background: linear-gradient(135deg, #3a3a3a, #9e9e9e);
      border: 2px solid #b0b0b0;
    }
    .podium-card.bronze {
      background: linear-gradient(135deg, #4a1c00, #c87137);
      border: 2px solid #cd7f32;
    }

    .podium-rank { font-size: 32px; margin-bottom: 6px; }
    .podium-name {
      font-family: var(--font-head);
      font-size: 22px; color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .podium-score {
      font-family: var(--font-head);
      font-size: 36px; color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .podium-meta { font-size: 12px; color: rgba(255,255,255,0.75); font-weight: 700; margin-top: 4px; }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      padding: 14px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.15);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--accent); }
    thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
    thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.1s;
      animation: fadeUp 0.3s ease both;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }

    tbody td {
      padding: 13px 16px;
      color: var(--text);
      font-weight: 700;
    }

    .rank-cell {
      font-family: var(--font-head);
      font-size: 18px;
      color: var(--text-dim);
      text-align: center;
      width: 48px;
    }
    .rank-cell.top1 { color: #ffd60a; }
    .rank-cell.top2 { color: #b0b0b0; }
    .rank-cell.top3 { color: #cd7f32; }

    .player-cell {
      display: flex; align-items: center; gap: 10px;
    }
    .player-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 900;
      flex-shrink: 0;
    }
    .player-cell-name { font-weight: 800; font-size: 15px; }

    .score-cell {
      font-family: var(--font-head);
      font-size: 20px;
      color: var(--accent);
    }

    .pct-cell { display: flex; align-items: center; gap: 8px; }
    .mini-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; min-width: 50px; }
    .mini-bar { height: 100%; border-radius: 3px; background: var(--grass-light); }
    .mini-bar.high { background: #52b788; }
    .mini-bar.low { background: var(--red); }

    .level-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px; font-weight: 800;
      background: rgba(255,255,255,0.1);
      white-space: nowrap;
    }

    .speed-cell { color: #74c69d; font-weight: 800; }
    .date-cell { color: var(--text-dim); font-size: 13px; }

    /* ── PLAYER CARD GRID ── */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .player-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 20px;
      animation: fadeUp 0.4s ease both;
      backdrop-filter: blur(8px);
    }

    .pc-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .pc-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-size: 20px;
      font-weight: 900; flex-shrink: 0;
    }
    .pc-name {
      font-family: var(--font-head); font-size: 20px; line-height: 1.1;
    }
    .pc-games { font-size: 12px; color: var(--text-dim); font-weight: 700; }

    .pc-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .pc-stat {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 8px 10px;
    }
    .pc-stat-val {
      font-family: var(--font-head);
      font-size: 18px;
      color: white;
    }
    .pc-stat-lbl {
      font-size: 10px; font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pc-cats { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; }
    .pc-cat-row { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; }
    .pc-cat-name { width: 80px; color: var(--text-dim); }
    .pc-cat-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .pc-cat-bar { height: 100%; border-radius: 3px; background: var(--grass-light); }
    .pc-cat-pct { width: 32px; text-align: right; color: var(--text-dim); }

    /* ── EMPTY / LOADING STATES ── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .state-box .state-icon { font-size: 52px; margin-bottom: 12px; }
    .state-box h3 { font-family: var(--font-head); font-size: 22px; color: var(--text-dim); margin-bottom: 8px; }
    .state-box p { font-size: 14px; font-weight: 600; line-height: 1.6; max-width: 360px; margin: 0 auto; }
    .state-box a { color: var(--accent); }
    .state-box code {
      background: rgba(255,255,255,0.1);
      padding: 2px 8px; border-radius: 6px;
      font-size: 12px; display: block;
      margin: 8px auto; max-width: 480px;
      word-break: break-all;
      color: var(--accent);
    }

    .loading-dots span {
      display: inline-block;
      animation: blink 1.2s ease infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .page-header { flex-direction: column; align-items: flex-start; }
      .podium-row { grid-template-columns: 1fr; }
      thead th.hide-mobile, tbody td.hide-mobile { display: none; }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- HEADER -->
  <div class="page-header">
    <div class="header-left">
      <div class="ball-icon">⚽</div>
      <div class="header-titles">
        <h1>Soccer <span>Brain</span></h1>
        <p>Player Stats Dashboard</p>
      </div>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()">
      <span class="refresh-icon">↻</span> Refresh
    </button>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="summary-row" id="summary-row">
    <div class="summary-card" style="animation-delay:0.05s">
      <div class="sc-icon">🎮</div>
      <div class="sc-val" id="sum-games">—</div>
      <div class="sc-lbl">Total Games</div>
    </div>
    <div class="summary-card" style="animation-delay:0.1s">
      <div class="sc-icon">👥</div>
      <div class="sc-val" id="sum-players">—</div>
      <div class="sc-lbl">Players</div>
    </div>
    <div class="summary-card" style="animation-delay:0.15s">
      <div class="sc-icon">🏆</div>
      <div class="sc-val" id="sum-best-score">—</div>
      <div class="sc-lbl">Top Score</div>
    </div>
    <div class="summary-card" style="animation-delay:0.2s">
      <div class="sc-icon">🎯</div>
      <div class="sc-val" id="sum-avg-acc">—</div>
      <div class="sc-lbl">Avg Accuracy</div>
    </div>
    <div class="summary-card" style="animation-delay:0.25s">
      <div class="sc-icon">⚡</div>
      <div class="sc-val" id="sum-avg-speed">—</div>
      <div class="sc-lbl">Avg Speed</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search player…" oninput="applyFilters()" />
    </div>
    <select class="filter-select" id="filter-level" onchange="applyFilters()">
      <option value="">All Levels</option>
      <option value="Grasshopper">🌱 Grasshopper</option>
      <option value="Striker">⚡ Striker</option>
      <option value="Champion">🏆 Champion</option>
    </select>
  </div>

  <!-- TABS -->
  <div class="tab-row">
    <button class="tab-btn active" data-tab="leaderboard" onclick="switchTab('leaderboard')">🏅 Leaderboard</button>
    <button class="tab-btn" data-tab="players" onclick="switchTab('players')">👤 Players</button>
    <button class="tab-btn" data-tab="sessions" onclick="switchTab('sessions')">📋 All Sessions</button>
  </div>

  <!-- VIEW: LEADERBOARD -->
  <div id="view-leaderboard" class="visible">
    <div id="podium-row" class="podium-row"></div>
    <div class="table-wrap">
      <table id="leaderboard-table">
        <thead>
          <tr>
            <th style="text-align:center">#</th>
            <th onclick="sortTable('leaderboard', 'name')">Player</th>
            <th onclick="sortTable('leaderboard', 'bestScore')">Best Score</th>
            <th onclick="sortTable('leaderboard', 'avgAccuracy')" class="hide-mobile">Avg Accuracy</th>
            <th onclick="sortTable('leaderboard', 'games')" class="hide-mobile">Games</th>
            <th onclick="sortTable('leaderboard', 'level')">Level</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
  </div>

  <!-- VIEW: PLAYER CARDS -->
  <div id="view-players">
    <div class="player-grid" id="player-grid"></div>
  </div>

  <!-- VIEW: ALL SESSIONS -->
  <div id="view-sessions">
    <div class="table-wrap">
      <table id="sessions-table">
        <thead>
          <tr>
            <th onclick="sortTable('sessions', 'date')">Date</th>
            <th onclick="sortTable('sessions', 'player')">Player</th>
            <th onclick="sortTable('sessions', 'score')">Score</th>
            <th onclick="sortTable('sessions', 'accuracy')" class="hide-mobile">Accuracy</th>
            <th onclick="sortTable('sessions', 'speed')" class="hide-mobile">Avg Speed</th>
            <th onclick="sortTable('sessions', 'correct')" class="hide-mobile">Correct</th>
            <th onclick="sortTable('sessions', 'level')">Level</th>
          </tr>
        </thead>
        <tbody id="sessions-body"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIGURATION — paste your published CSV URL here
   ═══════════════════════════════════════════════════════════ */
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTd3eBcyrAm8ctH_fvsElO8UUF_bWOH3ywJIk1-Zpnk0J7-fRp11_ndTJVVZJRIeRiWiLjg6X_mAFzz/pub?gid=900258406&single=true&output=csv';

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
let allRows = [];       // raw parsed rows
let filtered = [];      // after search/filter
let activeTab = 'leaderboard';
let sortState = { key: null, dir: 1 };

const AVATAR_COLORS = [
  '#e63946','#2a9d8f','#f77f00','#8338ec',
  '#06d6a0','#118ab2','#ff6b35','#4a90d9',
];

function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

/* ═══════════════════════════════════════════════════════════
   CSV LOADING & PARSING
   ═══════════════════════════════════════════════════════════ */
async function loadData() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');

  if (!SHEET_CSV_URL || SHEET_CSV_URL === 'PASTE_YOUR_CSV_URL_HERE') {
    showNotConfigured();
    btn.classList.remove('spinning');
    return;
  }

  try {
    // Use a CORS proxy to fetch the public CSV
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(SHEET_CSV_URL)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    allRows = parseCSV(text);
    filtered = [...allRows];
    updateSummary();
    applyFilters();
  } catch (err) {
    showError(err.message);
  } finally {
    btn.classList.remove('spinning');
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];

  // First row = headers
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());

  // Column index map (matches the form field order from forms.js)
  // Timestamp, Player Name, Date, Time, Score, Accuracy, Avg Speed,
  // Correct Answers, Total Questions, Level, Passing, Shooting,
  // Defending, Positioning, Awareness, Reactions
  return lines.slice(1).map((line, i) => {
    const cols = splitCSVLine(line);
    const get = (idx) => (cols[idx] || '').replace(/^"|"$/g, '').trim();

    // Find columns by header name (case-insensitive, flexible)
    const idx = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

    const tsIdx    = idx('timestamp');
    const nameIdx  = idx('player');
    const dateIdx  = idx('date');
    const timeIdx  = idx('time');
    const scoreIdx = idx('score');
    const accIdx   = idx('accuracy');
    const speedIdx = idx('speed');
    const corrIdx  = idx('correct');
    const totIdx   = idx('total');
    const levelIdx = idx('level');
    const passIdx  = idx('passing');
    const shootIdx = idx('shooting');
    const defIdx   = idx('defending');
    const posIdx   = idx('position');
    const awaIdx   = idx('awareness');
    const rxnIdx   = idx('reaction');

    return {
      _rowIndex: i,
      timestamp: tsIdx  >= 0 ? get(tsIdx)  : '',
      player:    nameIdx >= 0 ? get(nameIdx): get(1),
      date:      dateIdx >= 0 ? get(dateIdx): get(2),
      time:      timeIdx >= 0 ? get(timeIdx): get(3),
      score:     parseFloat(scoreIdx >= 0 ? get(scoreIdx) : get(4)) || 0,
      accuracy:  parseFloat(accIdx   >= 0 ? get(accIdx)  : get(5)) || 0,
      speed:     parseFloat(speedIdx >= 0 ? get(speedIdx): get(6)) || 0,
      correct:   parseInt  (corrIdx  >= 0 ? get(corrIdx) : get(7)) || 0,
      total:     parseInt  (totIdx   >= 0 ? get(totIdx)  : get(8)) || 0,
      level:     levelIdx  >= 0 ? get(levelIdx): get(9),
      passing:   parseFloat(passIdx  >= 0 ? get(passIdx) : get(10)) || null,
      shooting:  parseFloat(shootIdx >= 0 ? get(shootIdx): get(11)) || null,
      defending: parseFloat(defIdx   >= 0 ? get(defIdx)  : get(12)) || null,
      positioning: parseFloat(posIdx >= 0 ? get(posIdx)  : get(13)) || null,
      awareness: parseFloat(awaIdx   >= 0 ? get(awaIdx)  : get(14)) || null,
      reactions: parseFloat(rxnIdx   >= 0 ? get(rxnIdx)  : get(15)) || null,
    };
  }).filter(r => r.player);
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

/* ═══════════════════════════════════════════════════════════
   SUMMARY
   ═══════════════════════════════════════════════════════════ */
function updateSummary() {
  const rows = allRows;
  const players = new Set(rows.map(r => r.player.toLowerCase())).size;
  const bestScore = Math.max(...rows.map(r => r.score), 0);
  const avgAcc = rows.length > 0
    ? Math.round(rows.reduce((a, r) => a + r.accuracy, 0) / rows.length)
    : 0;
  const speeds = rows.filter(r => r.speed > 0).map(r => r.speed);
  const avgSpeed = speeds.length > 0
    ? (speeds.reduce((a, b) => a + b, 0) / speeds.length).toFixed(1)
    : '—';

  document.getElementById('sum-games').textContent    = rows.length;
  document.getElementById('sum-players').textContent  = players;
  document.getElementById('sum-best-score').textContent = bestScore;
  document.getElementById('sum-avg-acc').textContent  = avgAcc + '%';
  document.getElementById('sum-avg-speed').textContent = avgSpeed !== '—' ? avgSpeed + 's' : '—';
}

/* ═══════════════════════════════════════════════════════════
   FILTERS & SEARCH
   ═══════════════════════════════════════════════════════════ */
function applyFilters() {
  const q     = document.getElementById('search-input').value.toLowerCase();
  const level = document.getElementById('filter-level').value;

  filtered = allRows.filter(r => {
    const matchName  = !q     || r.player.toLowerCase().includes(q);
    const matchLevel = !level || r.level === level;
    return matchName && matchLevel;
  });

  renderCurrentTab();
}

/* ═══════════════════════════════════════════════════════════
   TABS
   ═══════════════════════════════════════════════════════════ */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  ['leaderboard', 'players', 'sessions'].forEach(t => {
    document.getElementById(`view-${t}`).classList.toggle('visible', t === tab);
  });
  renderCurrentTab();
}

function renderCurrentTab() {
  if (activeTab === 'leaderboard') renderLeaderboard();
  else if (activeTab === 'players') renderPlayers();
  else renderSessions();
}

/* ═══════════════════════════════════════════════════════════
   LEADERBOARD VIEW
   ═══════════════════════════════════════════════════════════ */
function buildPlayerMap(rows) {
  const map = {};
  rows.forEach(r => {
    const key = r.player.toLowerCase();
    if (!map[key]) {
      map[key] = { name: r.player, games: 0, bestScore: 0, totalAcc: 0, speeds: [], level: r.level,
                   passing:[], shooting:[], defending:[], positioning:[], awareness:[], reactions:[] };
    }
    const p = map[key];
    p.games++;
    p.bestScore = Math.max(p.bestScore, r.score);
    p.totalAcc += r.accuracy;
    if (r.speed > 0) p.speeds.push(r.speed);
    if (r.level) p.level = r.level; // last seen level
    ['passing','shooting','defending','positioning','awareness','reactions'].forEach(c => {
      if (r[c] !== null && !isNaN(r[c])) p[c].push(r[c]);
    });
  });
  // Aggregate
  return Object.values(map).map(p => ({
    ...p,
    avgAccuracy: p.games > 0 ? Math.round(p.totalAcc / p.games) : 0,
    avgSpeed:    p.speeds.length > 0 ? (p.speeds.reduce((a,b)=>a+b,0)/p.speeds.length).toFixed(1) : null,
    passing:     avg(p.passing), shooting: avg(p.shooting), defending: avg(p.defending),
    positioning: avg(p.positioning), awareness: avg(p.awareness), reactions: avg(p.reactions),
  })).sort((a, b) => b.bestScore - a.bestScore);
}

function avg(arr) {
  return arr.length > 0 ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : null;
}

function renderLeaderboard() {
  const players = buildPlayerMap(filtered);
  const tbody = document.getElementById('leaderboard-body');
  const podium = document.getElementById('podium-row');

  if (players.length === 0) {
    tbody.innerHTML = '';
    podium.innerHTML = '';
    showEmpty('leaderboard-body', 'No players match your search.');
    return;
  }

  // Podium top 3
  const podiumEmojis = ['🥇','🥈','🥉'];
  const podiumClasses = ['gold','silver','bronze'];
  podium.innerHTML = players.slice(0, 3).map((p, i) => `
    <div class="podium-card ${podiumClasses[i]}" style="animation-delay:${i*0.08}s">
      <div class="podium-rank">${podiumEmojis[i]}</div>
      <div class="podium-name">${esc(p.name)}</div>
      <div class="podium-score">${p.bestScore}</div>
      <div class="podium-meta">${p.games} game${p.games!==1?'s':''} · ${p.avgAccuracy}% acc</div>
    </div>
  `).join('');

  // Table
  tbody.innerHTML = players.map((p, i) => {
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const color = avatarColor(p.name);
    const accBar = barHtml(p.avgAccuracy);
    return `
      <tr style="animation-delay:${i*0.04}s">
        <td class="rank-cell ${rankClass}">${i + 1}</td>
        <td>
          <div class="player-cell">
            <div class="player-avatar" style="background:${color}">${p.name.charAt(0).toUpperCase()}</div>
            <span class="player-cell-name">${esc(p.name)}</span>
          </div>
        </td>
        <td class="score-cell">${p.bestScore}</td>
        <td class="hide-mobile">${accBar}</td>
        <td class="hide-mobile">${p.games}</td>
        <td><span class="level-badge">${levelEmoji(p.level)} ${esc(p.level)}</span></td>
      </tr>
    `;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   PLAYERS VIEW
   ═══════════════════════════════════════════════════════════ */
function renderPlayers() {
  const players = buildPlayerMap(filtered);
  const grid = document.getElementById('player-grid');

  if (players.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1">${emptyHtml('No players found.')}</div>`;
    return;
  }

  const cats = [
    ['passing','🔄 Pass'],['shooting','🥅 Shot'],['defending','🛡️ Def'],
    ['positioning','📍 Pos'],['awareness','👀 Aware'],['reactions','⚡ React'],
  ];

  grid.innerHTML = players.map((p, i) => {
    const color = avatarColor(p.name);
    const catRows = cats
      .filter(([k]) => p[k] !== null)
      .map(([k, label]) => `
        <div class="pc-cat-row">
          <span class="pc-cat-name">${label}</span>
          <div class="pc-cat-bar-wrap"><div class="pc-cat-bar" style="width:${p[k]}%"></div></div>
          <span class="pc-cat-pct">${p[k]}%</span>
        </div>
      `).join('');

    return `
      <div class="player-card" style="animation-delay:${i*0.05}s">
        <div class="pc-header">
          <div class="pc-avatar" style="background:${color}">${p.name.charAt(0).toUpperCase()}</div>
          <div>
            <div class="pc-name">${esc(p.name)}</div>
            <div class="pc-games">${p.games} game${p.games!==1?'s':''} · ${levelEmoji(p.level)} ${esc(p.level)}</div>
          </div>
        </div>
        <div class="pc-stats">
          <div class="pc-stat">
            <div class="pc-stat-val">${p.bestScore}</div>
            <div class="pc-stat-lbl">Best Score</div>
          </div>
          <div class="pc-stat">
            <div class="pc-stat-val">${p.avgAccuracy}%</div>
            <div class="pc-stat-lbl">Avg Accuracy</div>
          </div>
          <div class="pc-stat">
            <div class="pc-stat-val">${p.avgSpeed ? p.avgSpeed+'s' : '—'}</div>
            <div class="pc-stat-lbl">Avg Speed</div>
          </div>
          <div class="pc-stat">
            <div class="pc-stat-val">${p.games}</div>
            <div class="pc-stat-lbl">Games</div>
          </div>
        </div>
        ${catRows ? `<div class="pc-cats">${catRows}</div>` : ''}
      </div>
    `;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   SESSIONS VIEW
   ═══════════════════════════════════════════════════════════ */
function renderSessions() {
  const rows = [...filtered].sort((a, b) => {
    // Sort by timestamp desc by default
    const ta = new Date(a.timestamp || a.date + ' ' + a.time);
    const tb = new Date(b.timestamp || b.date + ' ' + b.time);
    return tb - ta;
  });

  const tbody = document.getElementById('sessions-body');
  if (rows.length === 0) {
    tbody.innerHTML = '';
    showEmpty('sessions-body', 'No sessions match your search.');
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const color = avatarColor(r.player);
    const accBar = barHtml(r.accuracy);
    const dateStr = r.date || r.timestamp?.split('T')[0] || '—';
    return `
      <tr style="animation-delay:${Math.min(i,15)*0.03}s">
        <td class="date-cell">${esc(dateStr)} <span style="color:var(--text-dim);font-size:12px">${esc(r.time||'')}</span></td>
        <td>
          <div class="player-cell">
            <div class="player-avatar" style="background:${color};width:28px;height:28px;font-size:12px">${r.player.charAt(0).toUpperCase()}</div>
            <span>${esc(r.player)}</span>
          </div>
        </td>
        <td class="score-cell">${r.score}</td>
        <td class="hide-mobile">${accBar}</td>
        <td class="speed-cell hide-mobile">${r.speed > 0 ? r.speed + 's' : '—'}</td>
        <td class="hide-mobile" style="color:var(--text-dim)">${r.correct}/${r.total}</td>
        <td><span class="level-badge">${levelEmoji(r.level)} ${esc(r.level)}</span></td>
      </tr>
    `;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════
   SORT
   ═══════════════════════════════════════════════════════════ */
function sortTable(view, key) {
  if (sortState.key === key) sortState.dir *= -1;
  else { sortState.key = key; sortState.dir = -1; }

  if (view === 'leaderboard' || view === 'players') {
    const players = buildPlayerMap(filtered);
    players.sort((a, b) => {
      const va = a[key] ?? '', vb = b[key] ?? '';
      return typeof va === 'number' ? (va - vb) * sortState.dir
        : String(va).localeCompare(String(vb)) * sortState.dir;
    });
    // Re-render with sorted order
    if (view === 'leaderboard') renderFromSorted(players);
    else renderPlayersFromSorted(players);
  } else {
    filtered.sort((a, b) => {
      const va = a[key] ?? '', vb = b[key] ?? '';
      return typeof va === 'number' ? (va - vb) * sortState.dir
        : String(va).localeCompare(String(vb)) * sortState.dir;
    });
    renderSessions();
  }
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
function barHtml(pct) {
  const cls = pct >= 70 ? 'high' : pct < 40 ? 'low' : '';
  return `<div class="pct-cell">
    <div class="mini-bar-wrap"><div class="mini-bar ${cls}" style="width:${pct}%"></div></div>
    <span style="font-size:13px;font-weight:800;min-width:38px">${pct}%</span>
  </div>`;
}

function levelEmoji(level) {
  const map = { 'Grasshopper':'🌱', 'Striker':'⚡', 'Champion':'🏆' };
  return map[level] || '⚽';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showEmpty(bodyId, msg) {
  const el = document.getElementById(bodyId);
  if (el) el.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:40px;color:var(--text-dim);font-weight:700">${msg}</td></tr>`;
}

function emptyHtml(msg) {
  return `<div class="state-box"><div class="state-icon">🔍</div><h3>No Results</h3><p>${msg}</p></div>`;
}

function showNotConfigured() {
  const views = ['leaderboard-body','sessions-body','player-grid'];
  const html = `
    <div class="state-box">
      <div class="state-icon">📋</div>
      <h3>Connect your Google Sheet</h3>
      <p>Open <strong>leaderboard.html</strong> and paste your published CSV URL into the <code>SHEET_CSV_URL</code> variable at the top of the script:</p>
      <code>const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/XXXXX/pub?gid=0&single=true&output=csv';</code>
      <p style="margin-top:12px">To get this URL: open your Google Sheet → <strong>File → Share → Publish to web</strong> → select your sheet → choose <strong>CSV</strong> → click <strong>Publish</strong> → copy the link.</p>
    </div>
  `;
  document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="10">${html}</td></tr>`;
  document.getElementById('player-grid').innerHTML = html;
  document.getElementById('sessions-body').innerHTML = `<tr><td colspan="10">${html}</td></tr>`;
  document.getElementById('podium-row').innerHTML = '';
}

function showError(msg) {
  const html = `
    <div class="state-box">
      <div class="state-icon">⚠️</div>
      <h3>Couldn't load data</h3>
      <p>Make sure your Google Sheet is published as a CSV and the URL in <code>SHEET_CSV_URL</code> is correct.<br><br><small style="color:var(--red)">${esc(msg)}</small></p>
    </div>
  `;
  document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="10">${html}</td></tr>`;
  document.getElementById('player-grid').innerHTML = html;
  document.getElementById('sessions-body').innerHTML = `<tr><td colspan="10">${html}</td></tr>`;
  document.getElementById('podium-row').innerHTML = '';
}
